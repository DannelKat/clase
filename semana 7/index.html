<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Daño</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <h1>Simulador de Batalla</h1>
        
        <div class="stats">
            <div class="stat-row">Vida Jugador: <span id="player-hp">100</span></div>
            <div class="stat-row">Vida Enemigo: <span id="enemy-hp">100</span></div>
        </div>

        <div class="controls">
            <button id="attack-btn">Atacar</button>
            
        </div>

        <div id="log">
            <div>¡Comienza la pelea!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
